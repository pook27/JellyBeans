<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOD - גח"א</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/x-icon" href="/icon.ico">
</head>

<body>
  <div class="container">
  <div class="toolbar">
    <h2>{{currentPath}}</h2>

    <div class="toolbar-actions">
      <input type="text" id="searchInput" class="search-input" placeholder="Search files..." oninput="filterFiles()">

      <button class="view-toggle" id="viewToggle" onclick="toggleView()" title="Switch view">
        <span id="viewIcon">☰</span>
      </button>
    </div>
  </div>

  <form class="upload-box" action="/upload" method="post" enctype="multipart/form-data">
    <input type="hidden" name="targetPath" value="{{currentPath}}">
    <input type="text" name="customName" id="customName"
      style="display: none; flex: 1; padding: 0.4rem; border: 1px solid var(--grey-3); border-radius: var(--radius-sm);">
    <input type="file" name="myFile" id="fileInput" required>
    <button type="submit">Upload Here</button>
  </form>

  <div class="grid">
    {{backButton}}
    {{htmlItems}}
  </div>
  </div>
  </div>

  <div id="fileMenuOverlay" class="overlay" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <h3 id="menuTitle">Filename</h3>
        <button class="modal-close-btn" onclick="closeMenu()">✕</button>
      </div>
      <div class="modal-actions">
        
        <div id="menuInfoContent" style="font-size: 0.9rem; line-height: 1.8; color: var(--black); padding: 0.5rem 0 1rem 0; direction: ltr; text-align: left;">
          <i>Loading details...</i>
        </div>
        
        <div class="action-divider"></div>

        <div class="menu-buttons">
          <button onclick="downloadFile()" class="btn-blue">Download File</button>
          <button onclick="renameFile()" class="btn-blue">Rename</button>
          <div class="action-divider"></div>
          <button onclick="deleteFile()" class="btn-danger" style="background: var(--danger-light);">Delete</button>
        </div>
      </div>
      <div class="modal-footer">
        <button onclick="closeMenu()" class="btn-grey">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/index.js"></script>
</body>

</html>
