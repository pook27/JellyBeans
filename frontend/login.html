<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - File Explorer</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container" style="max-width: 400px; text-align: center;">
    <h2>Admin Login</h2>
    <form action="/login" method="POST" style="display: flex; flex-direction: column; gap: 1rem;">
      <input type="text" name="username" placeholder="Username" required style="padding: 0.5rem;">
      <input type="password" name="password" placeholder="Password" required style="padding: 0.5rem;">
      <button type="submit" style="background: #3b82f6; color: white; padding: 0.5rem; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Login</button>
    </form>
  </div>
</body>
</html>
